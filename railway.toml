[build]
builder = "nixpacks"

[deploy]
startCommand = "streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
healthcheckPath = "/"
restartPolicyType = "on_failure"

# Persistent volume must be mounted at /data in the Railway dashboard.
# Set DB_PATH=/data/pipeline.db in Railway environment variables.
# Cron is configured directly in the Railway dashboard as a separate Cron service.
